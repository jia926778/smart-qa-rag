<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart QA - 智能问答系统</title>
  <link rel="stylesheet" href="/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Smart QA</h2>
        <p class="subtitle">RAG 智能问答系统</p>
      </div>

      <!-- Collection selector -->
      <div class="sidebar-section">
        <label class="section-label">知识库</label>
        <div class="select-wrapper">
          <select id="collectionSelect">
            <option value="default">default</option>
          </select>
        </div>
        <div class="collection-actions">
          <input type="text" id="newCollectionName" placeholder="新建知识库名称" />
          <button id="btnCreateCollection" class="btn btn-sm">创建</button>
          <button id="btnDeleteCollection" class="btn btn-sm btn-danger">删除</button>
        </div>
      </div>

      <!-- Upload -->
      <div class="sidebar-section">
        <label class="section-label">文档上传</label>
        <div class="upload-area" id="uploadArea">
          <input type="file" id="fileInput" accept=".pdf,.txt,.docx,.md,.xlsx,.xls,.csv,.pptx,.html,.htm,.json,.xml,.yaml,.yml,.log,.png,.jpg,.jpeg,.tiff,.tif,.bmp,.mp3,.wav,.m4a,.mp4,.webm,.flac,.ogg" hidden />
          <p>点击或拖拽文件至此</p>
          <span class="upload-hint">支持 PDF · Word · Excel · PPT · Markdown · HTML · 图片OCR · 音视频转写</span>
        </div>
        <div id="uploadStatus" class="upload-status"></div>
      </div>

      <!-- Documents list -->
      <div class="sidebar-section">
        <label class="section-label">已上传文档</label>
        <div id="docList" class="doc-list">
          <p class="empty-hint">暂无文档</p>
        </div>
      </div>
    </aside>

    <!-- Main chat area -->
    <main class="chat-main">
      <header class="chat-header">
        <button class="btn-toggle-sidebar" id="btnToggleSidebar">☰</button>
        <h3>智能问答</h3>
        <span id="currentCollection" class="badge">default</span>
      </header>

      <div class="messages" id="messages">
        <div class="message assistant">
          <div class="bubble">
            您好！我是智能问答助手，请先在左侧上传文档到知识库，然后向我提问吧。
          </div>
        </div>
      </div>

      <div class="input-area">
        <div class="input-wrapper">
          <textarea
            id="questionInput"
            placeholder="输入您的问题..."
            rows="1"
          ></textarea>
          <button id="btnSend" class="btn btn-primary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>
  <script src="/app.js"></script>
</body>
</html>
